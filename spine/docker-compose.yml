services:
  spine:
    image: ghcr.io/rghamilton3/lattice-spine:latest
    container_name: lattice-spine
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      LATTICE_AGENT_TOKEN: ${LATTICE_AGENT_TOKEN:?LATTICE_AGENT_TOKEN is required}
    volumes:
      - /var/lib/lattice:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/ping"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
