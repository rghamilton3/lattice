name: CI — lattice-agent

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent-ci.yml'
  pull_request:
    paths:
      - 'agent/**'

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
