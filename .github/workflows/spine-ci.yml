name: CI — spine

on:
  push:
    branches: [main]
    paths:
      - 'spine/**'
      - '.github/workflows/spine-ci.yml'
  pull_request:
    paths:
      - 'spine/**'

jobs:
  test:
    name: Type-check and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spine
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Test
        run: bun test
