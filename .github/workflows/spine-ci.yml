name: CI - spine

on:
  push:
    branches: [main]
    paths:
      - 'spine/**'
      - '.github/workflows/spine-ci.yml'
  pull_request:

jobs:
  test:
    name: Type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spine changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^spine/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.changed == 'true'
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: spine
        run: bun install --frozen-lockfile

      - name: Type-check
        if: steps.changes.outputs.changed == 'true'
        working-directory: spine
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Test
        if: steps.changes.outputs.changed == 'true'
        working-directory: spine
        run: bun test
