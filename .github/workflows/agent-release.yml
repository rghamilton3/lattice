name: Release — lattice-agent

on:
  push:
    tags:
      - 'agent-v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
          key: ${{ matrix.target }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build
        run: cargo zigbuild --release --bin lattice-agent --bin lattice-tray --bin lattice-capture --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/lattice-agent   ../lattice-agent-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/lattice-tray    ../lattice-tray-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/lattice-capture ../lattice-capture-${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lattice-agent-${{ matrix.target }}
          path: |
            lattice-agent-${{ matrix.target }}
            lattice-tray-${{ matrix.target }}
            lattice-capture-${{ matrix.target }}

  build-config:
    name: Build lattice-config (x86_64 linux-gnu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 dev headers
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
          key: x86_64-linux-gnu-config

      - name: Build lattice-config
        run: cargo build --release --features config-ui --bin lattice-config

      - name: Rename binary
        run: cp target/release/lattice-config ../lattice-config-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lattice-config-x86_64
          path: lattice-config-x86_64-unknown-linux-gnu

  release:
    name: Publish GitHub Release
    needs: [build, build-config]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Stage extra release assets
        run: |
          cp agent/lattice-agent.service lattice-agent.service
          cp agent/lattice-tray.service lattice-tray.service

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lattice-agent-x86_64-unknown-linux-musl
            lattice-agent-aarch64-unknown-linux-musl
            lattice-tray-x86_64-unknown-linux-musl
            lattice-tray-aarch64-unknown-linux-musl
            lattice-capture-x86_64-unknown-linux-musl
            lattice-capture-aarch64-unknown-linux-musl
            lattice-config-x86_64-unknown-linux-gnu
            lattice-agent.service
            lattice-tray.service
